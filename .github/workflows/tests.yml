name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check for package.json
        id: has_pkg
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.has_pkg.outputs.present == 'true'
        run: npm ci

      - name: Run tests
        if: steps.has_pkg.outputs.present == 'true'
        run: npm test -- --run

      - name: No tests yet
        if: steps.has_pkg.outputs.present != 'true'
        run: echo "No package.json found; tests will run automatically after app scaffold is added."
