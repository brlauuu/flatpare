name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check for package.json
        id: has_pkg
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.has_pkg.outputs.present == 'true'
        run: npm ci

      - name: Lint
        if: steps.has_pkg.outputs.present == 'true'
        run: npm run lint --if-present

      - name: Build
        if: steps.has_pkg.outputs.present == 'true'
        run: npm run build --if-present

      - name: Build Docker image
        if: steps.has_pkg.outputs.present == 'true'
        run: docker build -t flatpare:ci .

      - name: No app code yet
        if: steps.has_pkg.outputs.present != 'true'
        run: echo "No package.json found; CI checks will enforce once app scaffold is added."
