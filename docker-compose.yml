services:
  flatpare:
    build: .
    ports:
      - "${PORT:-3002}:3000"
    env_file:
      - .env.local
    environment:
      - DISABLE_SECURE_COOKIES=true
      # Force local mode in Docker — override any cloud credentials from .env.local
      - TURSO_DATABASE_URL=
      - TURSO_AUTH_TOKEN=
      - BLOB_READ_WRITE_TOKEN=
    volumes:
      # Persist local SQLite database and uploaded PDFs
      - flatpare-data:/app/data
      - flatpare-uploads:/app/uploads

volumes:
  flatpare-data:
  flatpare-uploads:
